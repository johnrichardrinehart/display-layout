# Copy to $XDG_CONFIG_HOME/display-layout/config.ini.

# Width and height accept either logical pixels or a percentage of the current monitor.
width = 1060px
height = 87%

# UI text size in logical pixels.
font-size = 16

# dark, light, or system
# "system" follows common desktop/GTK preferences and otherwise uses dark mode.
theme = system

# Optional TrueType font path. The bundled default is vector-rendered with antialiasing.
# font = /path/to/a/monospace-font.ttf

# Screen-pixel distance at which display edges snap together while dragging.
snap-distance = 14

# How long output-identification numerals remain visible while fading out.
identify-duration-ms = 2000

# auto detects niri, Sway, Hyprland, GNOME, KDE Plasma, or a wlroots
# compositor. Explicit values: niri, sway, hyprland, wlr, gnome, kscreen.
backend = auto
