name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  nix-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Run Nix flake checks
        run: nix flake check --print-build-logs
